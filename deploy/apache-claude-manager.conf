# Claude Manager — Apache reverse proxy snippet.
#
# Drop this INSIDE an existing <VirtualHost> (e.g. the SSL vhost in
# /etc/apache2/sites-available/default-ssl.conf), or adapt as needed.
# It exposes the app at  https://<host>/claude-manager/  with Basic auth,
# restricted to your LAN, proxying to the localhost-only Node service.
#
# One-time module enable:
#   sudo a2enmod proxy proxy_http auth_basic authn_file authz_host
#   sudo systemctl reload apache2

<Location /claude-manager/>
    # --- Reverse proxy to the localhost Node service ---
    ProxyPass         http://127.0.0.1:8765/
    ProxyPassReverse  http://127.0.0.1:8765/

    # --- Authentication ---
    AuthType Basic
    AuthName "Claude Manager"
    AuthUserFile /etc/apache2/claude-manager.htpasswd
    Require valid-user

    # --- LAN restriction (adjust to your subnet) ---
    # Combined with auth: must be BOTH on the LAN AND authenticated.
    <RequireAll>
        Require valid-user
        Require ip 127.0.0.1 ::1 192.168.0.0/16 10.0.0.0/8
        # If you use Tailscale, add: Require ip 100.64.0.0/10
    </RequireAll>
</Location>

# Redirect the bare path to the trailing-slash form so relative asset/API
# URLs resolve correctly.
RedirectMatch ^/claude-manager$ /claude-manager/
